// FBTF PUSH 6v6 CFG
exec fbtf_6v6

mp_timelimit			"30"
mp_winlimit 			"5"
mp_roundtime "240"	
mp_timelimit_improved "0"
mp_tournament_restart
say FBTF 6v6 CFG - Mapas Capture Points (5 CP) - Sem "B4nny CFG"
say Configuracao para a LBTF2 (23 Edicao)
say Pontuacao PUSH: a partida termina apos 30 minutos ou se um time ganhar 5 rounds em qualquer momento da partida
say Em caso de empate, execute fbtf_golden_cap.cfg para Golden Cap sem limite de tempo.
say ------------
say *** AVISOS IMPORTANTES ***
say Os lideres das equipes devem confirmar o mapa, a sua versao, a CFG, a whitelist, e os plugins de logs.tf e sizzlingsstats.
say Quaisquer irregularidades devem ser alegadas imediatamente.
say Em caso de duvida, procure um Staff da FBTF.
say ------------
say TODOS OS JOGADORES DEVEM GRAVAR POV DE TODA A SUA PARTICIPACAO NA PARTIDA.