say *** AVISOS IMPORTANTES ***
say Os lideres das equipes devem confirmar o mapa, a sua versao, a CFG, a whitelist, e os plugins de logs.tf e sizzlingsstats.
say Quaisquer irregularidades devem ser alegadas imediatamente.
say Em caso de duvida, procure um Staff da FBTF.
say ------------
say TODOS OS JOGADORES DEVEM GRAVAR POV DE TODA A SUA PARTICIPACAO NA PARTIDA.