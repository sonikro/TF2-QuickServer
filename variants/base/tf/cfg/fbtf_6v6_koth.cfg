// FBTF KOTH 6v6 CFG
exec fbtf_6v6
mp_timelimit	"0"
mp_winlimit 	"4"
mp_timelimit_improved 0
mp_roundtime -1
mp_tournament_restart

say FBTF 6v6 CFG - Mapas Koth of the Hill (KOTH)
say Configuracao para a LBTF2 (17 Edicao)
say Pontuacao KOTH: A partida termina apos 4 rounds ganhos em qualquer momento da partida sem limite de tempo
