// [StAC] enable/disable plugin (setting this to 0 immediately unloads stac)
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
stac_enabled "1"

// [StAC] enable/disable showing verbose info about players' cvars and other similar info in admin console
// (recommended 0 unless you want spam in console)
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
stac_verbose_info "0"

// [StAC] ban duration that StAC will use upon banning cheating clients. 0 = permanent.
// -
// Default: "0"
// Minimum: "0.000000"
stac_ban_duration "0"

// [StAC] maximum allowed time in seconds before client is autokicked for using turn binds (+right/+left inputs). -1 to disable autokicking, 0 instakicks
// (recommended -1.0 unless you're using this in a competitive setting)
// -
// Default: "-1.000000"
// Minimum: "-1.000000"
stac_max_allowed_turn_secs "-1.000000"

// [StAC] ban clients for non angle based cheats, aka cheat locked cvars, netprops, invalid names, invalid chat characters, etc.
// (defaults to 1)
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
stac_ban_for_misccheats "0"

// [StAC] optimize cvars related to patching backtracking, mostly patching doubletap, limiting fakelag, patching any possible tele expoits, etc.
// (defaults to 1)
// NOTE: Set to 0 to avoid being gameplay-altering and to prevent conflicts with league configs
// (e.g. ETF2L sets net_chan_limit_msec to 75, which triggers kicks when stac_optimize_cvars is 1)
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
stac_optimize_cvars "0"

// [StAC] maximum aimsnap detections before banning a client.
// -1 to disable even checking angles (saves cpu), 0 to print to admins/stv but never ban
// (recommended 20 or higher)
// -
// Default: "20"
// Minimum: "-1.000000"
stac_max_aimsnap_detections "0"

// [StAC] maximum silent aim/norecoil detections before banning a client.
// -1 to disable even checking angles (saves cpu), 0 to print to admins/stv but never ban
// (recommended 15 or higher)
// -
// Default: "10"
// Minimum: "-1.000000"
stac_max_psilent_detections "0"

// [StAC] maximum consecutive bhop detections on a client before they get "antibhopped". client will get banned on this value + 2, so for default cvar settings, client will get banned on 12 tick perfect bhops.
// -1 to disable even checking bhops (saves cpu), 0 to print to admins/stv but never ban
// (recommended 10 or higher)
// -
// Default: "10"
// Minimum: "-1.000000"
stac_max_bhop_detections "0"

// [StAC] maximum fake angle / wrong / OOB angle detections before banning a client.
// -1 to disable even checking angles (saves cpu), 0 to print to admins/stv but never ban
// (recommended 10)
// -
// Default: "10"
// Minimum: "-1.000000"
stac_max_fakeang_detections "0"

// [StAC] maximum cmdnum spikes a client can have before getting banned.
// -1 to disable checking, 0 to print to admins/stv but never ban
// (recommended 25)
// -
// Default: "20"
// Minimum: "-1.000000"
stac_max_cmdnum_detections "0"

// [StAC] maximum triggerbot detections before banning a client.
// 0 = it never bans, only logs. recommended 20+ if you are comfortable permabanning macroing users
// -
// Default: "0"
// Minimum: "-1.000000"
stac_max_tbot_detections "0"

// [StAC] minimum interp (lerp) in milliseconds that a client is allowed to have before getting autokicked. -1 to disable
// (recommended disabled - interp values below 15.1515151 ms don't seem to have any noticeable effects)
// -
// Default: "-1"
// Minimum: "-1.000000"
stac_min_interp_ms "-1"

// [StAC] maximum interp (lerp) in milliseconds that a client is allowed to have before getting autokicked. -1 to disable
// (recommended 101 for competitive leagues like ozfortress)
// -
// Default: "101"
// Minimum: "-1.000000"
stac_max_interp_ms "101"

// [StAC] check AT LEAST this often in seconds for clients with violating cvar values/netprops
// (recommended 60)
// -
// Default: "60.000000"
// Minimum: "5.000000"
stac_min_randomcheck_secs "60.000000"

// [StAC] check AT MOST this often in seconds for clients with violating cvar values/netprops
// (recommended 300)
// -
// Default: "300.000000"
// Minimum: "15.000000"
stac_max_randomcheck_secs "300.000000"

// [StAC] enable/disable putting the currently recording demo in the SourceBans / gbans ban reason
// (recommended 1)
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
stac_include_demoname_in_banreason "0"

// [StAC] enable/disable logging to file
// (recommended 1)
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
stac_log_to_file "1"

// [StAC] enable fixing pingmasking? This also allows StAC to ban cheating clients attempting to pingreduce.
// -
// Default: "1"
// Minimum: "0.000000"
// Maximum: "1.000000"
stac_fixpingmasking_enabled "1"

// [StAC] maximum number of times a client can spam userinfo updates (over the course of 10 seconds) before getting banned.
// (recommended 10+)
// -
// Default: "25"
// Minimum: "-1.000000"
stac_max_userinfo_spam_detections "0"

// [StAC] Forcibly reconnect clients unauthorized with steam - this protects against cheat clients not setting steamids,
// at the cost of making your server inaccessible when Steam is down.
// (recommended 0, only enable this if you have consistent issues with unauthed cheaters!)
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
stac_kick_unauthed_clients "0"

// [StAC] If this cvar is 0 (default), StAC will print detections to admins with sm_ban access and to SourceTV.
// If 1, prints only to SourceTV. If 2, StAC never prints anything in chat to anyone. If -1, prints ALL detections to ALL players.
// (recommended 2 for competitive servers to keep chat clean)
// -
// Default: "0"
// Minimum: "-1.000000"
// Maximum: "2.000000"
stac_silent "2"

// [StAC] Max connections allowed from the same IP address. Useful for autokicking bots.
// (recommended 0, you should really only enable this if you're getting swarmed by bots)
// -
// Default: "0"
// Minimum: "0.000000"
stac_max_connections_from_ip "0"

// [StAC] allow StAC to work when sv_cheats is 1.
// WARNING: you might get false positives!
// (recommended 0)
// -
// Default: "0"
// Minimum: "0.000000"
// Maximum: "1.000000"
stac_work_with_sv_cheats "0"
